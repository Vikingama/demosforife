<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DOM 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Node</h1>
</body>
<script>
    console.log(document.URL);
    console.log(document.domain);
    console.log(document.referrer);
    console.log(document.doctype);
    console.log(document.children);
    console.log(document.childNodes);// 神似数组
    console.log(document.childNodes[0] === document.childNodes.item(0));// true
    var nodeArray = Array.prototype.slice.call(document.childNodes, 0);// 将 NodeList 转换为 数组
    console.log(nodeArray);
    /*
         Node.ELEMENT_NODE(1)；---> 元素节点
         Node.ATTRIBUTE_NODE(2)；---> 属性节点
         Node.TEXT_NODE(3)；---> 文本节点
         Node.CDATA_SECTION_NODE(4)；---> 
         Node.ENTITY_REFERENCE_NODE(5)；---> 
         Node.ENTITY_NODE(6)；---> 
         Node.PROCESSING_INSTRUCTION_NODE(7)；---> 
         Node.COMMENT_NODE(8)；---> 注释节点
         Node.DOCUMENT_NODE(9)；---> 文档节点
         Node.DOCUMENT_TYPE_NODE(10)；---> 
         Node.DOCUMENT_FRAGMENT_NODE(11)；---> 
         Node.NOTATION_NODE(12)。---> 
    */
    const h1ele = document.querySelector("h1");
    console.log(h1ele.parentNode);
    console.log(h1ele.nodeType == Node.ELEMENT_NODE);
    console.log(h1ele.firstChild === h1ele.lastChild);
    console.log(h1ele.childNodes[0].hasChildNodes());
    console.log(h1ele.childNodes[0].ownerDocument);
    // appendChild()、insertBefore()、replaceChild()、removeChild()、cloneNode()、normalize()
</script>

</html>
