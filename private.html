<script>
    function Sample() {
        var privateVariable = 0;
        function privateMethod() {
            alert(privateVariable);
        };
        this.private = {
            variable: privateVariable,
            method: privateMethod
        }
    }
    var sampleItem = new Sample();
    sampleItem.private.variable = 100;
    sampleItem.private.method();
</script>
