<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Form Basic</title>
    <style>
        form {
            text-align: center;
        }

        [type="text"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10vmin;
        }

        [type="image"] {
            width: 10vmin;
            height: 10vmin;
            border-radius: 50%;
            transition: all 0.3s;
        }
    </style>
</head>

<body>
    <form action="https://www.baidu.com/">
        <input type="text" placeholder="键入搜索">
        <input type="image" src="./resource/submit.png">
    </form>
</body>

</html>
