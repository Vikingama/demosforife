<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DOM 1.2</title>
    <style>
        #tableSample {
            width: 100%;
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>

<body>
    <table id="tableSample">
        <caption>表格标题</caption>
        <!-- 
    colspan     跨列
    rowspan     跨行
 -->
        <thead>
            <tr>
                <th>表头一</th>
                <th>表头二</th>
                <th>表头三</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>123</td>
                <td>456</td>
                <td>789</td>
            </tr>
            <tr>
                <td colspan="4">O*^*O*^*O我是一行O*^*O*^*O</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>123</td>
                <td>456</td>
                <td>789</td>
            </tr>
        </tfoot>
    </table>
</body>
<script>
    let headVariable = "null";
</script>
<script>
    // 动态 JS
    function loadScript(jsURL) {
        let script = document.createElement("script");
        script.className = 'doExp';
        script.type = "text/javascript";
        script.src = jsURL;
        script.text = 'function tryThis(){alert("doExp");}';
        document.body.appendChild(script);
    };
    // loadScript("https://unpkg.com/jquery@3.3.1/dist/jquery.js");
    setTimeout(function () {
        try {
            // 可能是浏览器安全限制的原因，不同 script 标签是在一个作用域的...需要通过 eval 函数，将文本信息转化为 js 代码
            let doExpJs = document.querySelectorAll(".doExp")[0].innerText;
            eval(doExpJs);
            tryThis();
        } catch (error) {
            console.log(error);
        } finally {
            console.log(headVariable);
        };
    }, 1000);
    // 动态 CSS
    function loadStyle(cssURL) {
        let style = document.createElement("link"), isOK = document.createElement("style");
        style.id = "doCSS";
        style.rel = "stylesheet";
        style.type = "text/css";
        style.href = cssURL;
        isOK.type = "text/css";
        isOK.appendChild(document.createTextNode('html{background:red;}'));
        document.head.appendChild(style);
        document.head.appendChild(isOK);
    };
    // loadStyle("https://cdn.bootcss.com/bootstrap/4.1.1/css/bootstrap.min.css");
    // 操作表格

</script>


</html>
