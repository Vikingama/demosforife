<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Function</title>
</head>

<body>

</body>
<script>
    // 箭头函数不能变量提升、不能使用 new，只能通过函数表达式来定义...
    // 函数声明
    function sample() {
        console.log(1);
    };
    console.log(sample.name);
    // 函数表达式
    var sample = function () {
        console.log(2);
    }
    console.log(sample.name);
    var i = 1;
    var i = 2;
    // 为什么不报错???
    console.log(i);
    // 递归函数--->一个函数通过名字调用自身
    function factorialz(num) {
        if (num > 1) {
            // return num * factorialz(num - 1);
            /*
                callee---被召者、受话人
                caller---呼叫者、召集者、访问者
                arguments.callee 是一个指向正在执行的函数的指针...严格模式下报错--->指向拥有该 arguments 的函数
                console.log(anotherz.caller);--->函数的调用者
            */
            return num * arguments.callee(num - 1);
        } else {
            return 1;
        }
    };
    var anotherz = factorialz;
    factorialz = null;
    console.log(anotherz(5));
    // 闭包--->有权访问另一个函数作用域中的变量的函数
</script>

</html>
