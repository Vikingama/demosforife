<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Booster</title>
</head>

<body>

</body>
<script>
    var initialTime = new Date().getTime(), domFragment = document.createDocumentFragment(), i, item, betweenTime;
    function operateDom() {
        for (i = 0; i < 100; i++) {
            item = document.createElement("li");
            item.innerText = i;
            domFragment.appendChild(item);
        }
        document.body.appendChild(domFragment);
        betweenTime = new Date().getTime() - initialTime;
        return betweenTime;
    }
    console.log(operateDom());
</script>

</html>
