<script>
    var initialTime = new Date().getTime(), domFragment = document.createDocumentFragment(), i, t, itemOne, itemTwo, betweenTimeOne, betweenTimeTwo;
    function operateDomOne() {
        var liEles = document.getElementsByTagName("li");
        for (i = 0; i < liEles.length * 10; i++) {
            itemOne = document.createElement("i");
            itemOne.innerText = i;
            domFragment.appendChild(itemOne);
        }
        document.body.appendChild(domFragment);
        betweenTimeOne = new Date().getTime() - initialTime;
        return betweenTimeOne;
    }
    function operateDomTwo() {
        for (t = 0; t < document.getElementsByTagName("li").length * 10; t++) {
            itemTwo = document.createElement("i");
            itemTwo.innerText = t;
            domFragment.appendChild(itemTwo);
        }
        document.body.appendChild(domFragment);
        betweenTimeTwo = new Date().getTime() - initialTime;
        return betweenTimeTwo;
    }
